<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Garden of Unanswered Questions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        void: '#0a0e1f',
        voiddeep: '#05070f',
        ink: '#131830',
        aurora: '#3ddc97',
        violet: '#9b7fe0',
        ember: '#ff9a56',
        gold: '#ffd97a',
        river: '#7ec8ff',
        mist: '#dbe4f3',
        mistdim: '#8d96b3',
      },
      fontFamily: {
        display: ['"Cormorant Garamond"', 'serif'],
        body: ['Inter', 'sans-serif'],
      },
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: #05070f;
    color: #dbe4f3;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }
  #starfield-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #05070f; }
  ::-webkit-scrollbar-thumb { background: #2a3358; border-radius: 4px; }

  .glass {
    background: rgba(19, 24, 48, 0.45);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 217, 122, 0.12);
  }

  .glow-gold { filter: drop-shadow(0 0 12px rgba(255, 217, 122, 0.6)); }
  .glow-teal { filter: drop-shadow(0 0 14px rgba(61, 220, 151, 0.5)); }
  .glow-river { filter: drop-shadow(0 0 10px rgba(126, 200, 255, 0.55)); }

  .text-glow {
    text-shadow: 0 0 20px rgba(255, 217, 122, 0.35), 0 0 60px rgba(155, 127, 224, 0.2);
  }

  @keyframes drift {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    25% { transform: translateY(-12px) translateX(6px); }
    50% { transform: translateY(4px) translateX(-8px); }
    75% { transform: translateY(-6px) translateX(4px); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  @keyframes pulse-slow {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.06); }
  }
  @keyframes rise {
    from { transform: translateY(0) scale(1); opacity: 1; }
    to { transform: translateY(-900px) scale(0.3); opacity: 0; }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .font-display { font-family: 'Cormorant Garamond', serif; }

  .region-label {
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: #8d96b3;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<canvas id="starfield-canvas"></canvas>
<div id="root"></div>

<script src="./starfield.js"></script>
<script type="text/babel" data-presets="react,env" src="./app.js"></script>
</body>
</html>
